name: 'Terraform Azure VM'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: # Allows manual triggering

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: 'Terraform Infra'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Verify Azure Env Vars
        run: |
          if [ -z "$ARM_CLIENT_ID" ]; then echo "ARM_CLIENT_ID is missing"; fi
          if [ -z "$ARM_CLIENT_SECRET" ]; then echo "ARM_CLIENT_SECRET is missing"; fi
          if [ -z "$ARM_SUBSCRIPTION_ID" ]; then echo "ARM_SUBSCRIPTION_ID is missing"; fi
          if [ -z "$ARM_TENANT_ID" ]; then echo "ARM_TENANT_ID is missing"; fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -out=tfplan -var="admin_password=${{ secrets.VM_ADMIN_PASSWORD }}"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

  provision:
    name: 'Ansible Provisioning'
    needs: terraform
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Install Ansible and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible sshpass

      - name: Run Ansible Playbook
        run: |
          VM_IP=$(terraform output -raw public_ip_address)
          ansible-playbook -i "$VM_IP," -u azureuser --extra-vars "ansible_ssh_pass=${{ secrets.VM_ADMIN_PASSWORD }}" ansible/playbook.yml

