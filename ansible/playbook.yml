---
- name: Install Apache Tomcat
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install OpenJDK 11
      apt:
        name: openjdk-11-jdk
        state: present

    - name: Create tomcat group
      group:
        name: tomcat
        state: present

    - name: Create tomcat user
      user:
        name: tomcat
        group: tomcat
        shell: /bin/false
        home: /opt/tomcat

    - name: Download and unarchive Tomcat
      unarchive:
        src: "https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.96/bin/apache-tomcat-9.0.96.tar.gz"
        dest: /opt/
        remote_src: yes
        owner: tomcat
        group: tomcat

    - name: Fix Tomcat directory name (flatten)
      shell: mv /opt/apache-tomcat-9.0.96 /opt/tomcat
      args:
        creates: /opt/tomcat

    - name: Get Java Home
      shell: readlink -f /usr/bin/java | sed "s:/bin/java::"
      register: java_home_cmd

    - name: Set ownership on Tomcat directory recursively
      file:
        path: /opt/tomcat
        owner: tomcat
        group: tomcat
        recurse: yes

    - name: Set permissions on tomcat bin directory
      file:
        path: /opt/tomcat/bin
        mode: '0755'
        owner: tomcat
        group: tomcat
        recurse: yes

    - name: Create Tomcat systemd service file
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat Web Application Container
          After=network.target

          [Service]
          Type=simple
          User=tomcat
          Group=tomcat
          Environment="JAVA_HOME={{ java_home_cmd.stdout }}"
          Environment="CATALINA_HOME=/opt/tomcat"
          Environment="CATALINA_BASE=/opt/tomcat"
          ExecStart=/opt/tomcat/bin/catalina.sh run

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and start Tomcat
      systemd:
        name: tomcat
        state: started
        enabled: yes
        daemon_reload: yes
